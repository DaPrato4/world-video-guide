<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - World Video Guide</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }
        p {
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">📡</span>
        <h1>Sei offline</h1>
        <p>Al momento non disponi di una connessione internet. Controlla la tua rete e riprova.</p>
        <button onclick="window.location.reload()">Ricarica Pagina</button>
    </div>
</body>
</html>
